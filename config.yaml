# MODEL: "Qwen"  # The type of multi-modal LLM you would like to use to power the AppAgent, must be either OpenAI or Qwen
MODEL: "Doubao"
# OPENAI_API_BASE: "https://api.openai.com/v1/chat/completions"
# OPENAI_API_KEY: "sk-"  # Set the value to sk-xxx if you host the openai interface for open llm model
# OPENAI_API_MODEL: "gpt-4-vision-preview"  # The only OpenAI model by now that accepts visual input
# MAX_TOKENS: 300  # The max token limit for the response completion
# TEMPERATURE: 0.0  # The temperature of the model: the lower the value, the more consistent the output of the model
# REQUEST_INTERVAL: 10  # Time in seconds between consecutive GPT-4V requests

OPENAI_API_BASE: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
OPENAI_API_KEY: "sk-"  # Fill locally or set via env; do not commit real keys
OPENAI_API_MODEL: "glm-4.6v"  # The only OpenAI model by now that accepts visual input
MAX_TOKENS: 10000  # The max token limit for the response completion
TEMPERATURE: 0.0  # The temperature of the model: the lower the value, the more consistent the output of the model
REQUEST_INTERVAL: 10  # Time in seconds between consecutive GPT-4V requests

DASHSCOPE_API_KEY: ""  # Fill locally or set via env; do not commit real keys
QWEN_MODEL: "qwen-vl-max"

ARK_API_BASE: "https://ark.cn-beijing.volces.com/api/v3/chat/completions"
ARK_API_KEY: ""  # Fill locally or set via env; do not commit real keys
ARK_API_MODEL: "doubao-seed-2-0-mini-260215"
ARK_TEMPERATURE: 1
ARK_TOP_P: 0.7
ARK_MAX_TOKENS: 131072
ARK_REASONING_EFFORT: "medium"

# DASHSCOPE_API_KEY: ""  # The dashscope API key that gives you access to Qwen-VL model
# QWEN_MODEL: "qwen-vl-max"

ANDROID_SCREENSHOT_DIR: "/sdcard/AppAgent/screenshots"  # Set the directory on your Android device to store the intermediate screenshots. Make sure the directory EXISTS on your phone!
ANDROID_XML_DIR: "/sdcard/AppAgent/xml"  # Set the directory on your Android device to store the intermediate XML files used for determining locations of UI elements on your screen. Make sure the directory EXISTS on your phone!

DOC_REFINE: false  # Set this to true will make the agent refine existing documentation based on the latest demonstration; otherwise, the agent will not regenerate a new documentation for elements with the same resource ID.
MAX_ROUNDS: 20  # Set the round limit for the agent to complete the task
DARK_MODE: false  # Set this to true if your app is in dark mode to enhance the element labeling
MIN_DIST: 30  # The minimum distance between elements to prevent overlapping during the labeling process
